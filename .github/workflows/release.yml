name: "Release"
on:
  push:
    branches: [main]

jobs:
  build_and_test:
    name: "Build and Test"
    runs-on: ubuntu-latest
    outputs:
      should_publish: ${{ steps.version_gate.outputs.should_publish }}
    env:
      PUBLISHABLE_PACKAGE: vite-plugin-csp-guard
      PACKAGE_DIR: packages/vite-plugin-csp-guard
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # Fetch the full history to ensure HEAD^1 is available

      - name: Detect version bump for npm publish
        id: version_gate
        run: |
          diff_output=$(git diff HEAD^1 HEAD -- "$PACKAGE_DIR/package.json" || true)
          if [[ "$diff_output" == *'"version":'* ]]; then
            echo "should_publish=true" >> $GITHUB_OUTPUT
          else
            echo "should_publish=false" >> $GITHUB_OUTPUT
          fi

      - name: Set up environment
        uses: ./.github/actions/setup-env
        with:
          node-version: "23"

      - name: Build plugin package
        run: pnpm p:build

      - name: Archive production artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: package-dist
          retention-days: 30
          path: ${{ env.PACKAGE_DIR }}/dist

      - name: Run Unit Tests
        run: pnpm p:test

      - name: Build Apps
        run: pnpm build

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Run tests
        run: pnpm test

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 5

  publish:
    runs-on: ubuntu-latest
    needs: build_and_test
    if: needs.build_and_test.outputs.should_publish == 'true'
    name: "Publish"
    permissions:
      contents: write
      id-token: write
    env:
      PACKAGE_DIR: packages/vite-plugin-csp-guard
      PUBLISHABLE_PACKAGE: vite-plugin-csp-guard
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up environment
        uses: ./.github/actions/setup-env
        with:
          node-version: "23"

      - name: Download production artifacts
        uses: actions/download-artifact@v4
        with:
          name: package-dist
          path: ${{ env.PACKAGE_DIR }}/dist

      - uses: JS-DevTools/npm-publish@v4.1.5
        id: publish
        with:
          package: ${{ env.PACKAGE_DIR }}

      - name: Bump version and push tag
        if: ${{ steps.publish.outputs.type }}
        id: tag_version
        uses: mathieudutour/github-tag-action@v6.1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          custom_tag: v${{ steps.publish.outputs.version }}
          tag_prefix: ${{ env.PUBLISHABLE_PACKAGE }}_

      - name: Create a GitHub release
        if: ${{ steps.publish.outputs.type }}
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ steps.tag_version.outputs.new_tag }}
          name: ${{ steps.tag_version.outputs.new_tag }}
          body: ${{ steps.tag_version.outputs.changelog }}
          generateReleaseNotes: true

  build_docs:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "23"
      - run: corepack enable
      - run: pnpm install --filter docs
      - name: Build Documentation Site
        run: pnpm docs:build
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./apps/docs/out

  deploy:
    runs-on: ubuntu-latest
    needs: build_docs
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
